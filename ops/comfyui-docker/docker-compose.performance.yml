services:
  comfyui:
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512,garbage_collection_threshold:0.90
      - CUDA_MODULE_LOADING=LAZY
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command:
      - python
      - /app/main.py
      - --listen
      - 0.0.0.0
      - --port
      - "8188"
      - --input-directory
      - /app/input
      - --output-directory
      - /app/output
      - --temp-directory
      - /app/temp
      - --highvram
      - --reserve-vram
      - "0.5"
    shm_size: "16g"
    restart: unless-stopped
