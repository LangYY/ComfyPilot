services:
  comfyui:
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CUDA_MODULE_LOADING=LAZY
      - HF_HOME=/app/cache/huggingface
      - TRANSFORMERS_CACHE=/app/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/cache/huggingface
      - TZ=Asia/Shanghai
    command:
      - python
      - main.py
      - --listen
      - 0.0.0.0
      - --normalvram
      - --reserve-vram
      - "2"
